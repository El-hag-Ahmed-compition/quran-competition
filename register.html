<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المتسابقين | مسجد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            background-color: #06301d;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            background-blend-mode: overlay;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #fdb931;
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #fdb931; font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #fdb931;
            background: #fff;
            color: #333;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
        }

        .age-info {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #fdb931;
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #fdb931, #b8860b);
            color: #06301d;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:disabled { background: #666; cursor: not-allowed; }

        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: #fdb931; text-align:center;">استمارة التسجيل<br>مسجد الحاج أحمد الملهود</h2>

    <div class="form-card">
        <form id="registrationForm">
            <div class="form-group">
                <label>الاسم الرباعي:</label>
                <input type="text" name="name" required placeholder="أدخل اسمك كاملاً">
            </div>

            <div class="form-group">
                <label>تاريخ الميلاد:</label>
                <input type="date" id="birthDate" name="birthDate" required>
                <div id="ageDisplay" class="age-info">يرجى تحديد تاريخ الميلاد</div>
            </div>

            <div class="form-group">
                <label>المستوى المتاح لسنك:</label>
                <select id="levelSelect" name="level" required>
                    <option value="">اختر تاريخ الميلاد أولاً</option>
                    <option value="المستوى الأول">المستوى الأول (القرآن كاملاً) - حتى 20 سنة</option>
                    <option value="المستوى الثاني">المستوى الثاني (نصف القرآن) - حتى 15 سنة</option>
                    <option value="المستوى الثالث">المستوى الثالث (ثلث القرآن) - حتى 13 سنة</option>
                    <option value="المستوى الرابع">المستوى الرابع (ربع القرآن) - حتى 11 سنة</option>
                    <option value="المستوى الخامس">المستوى الخامس (5 أجزاء) - حتى 10 سنوات</option>
                </select>
            </div>

            <div class="form-group">
                <label>رقم الواتساب:</label>
                <input type="tel" name="phone" required placeholder="01xxxxxxxxx">
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">تأكيد التسجيل</button>
            <div id="statusMsg"></div>
        </form>
    </div>

    <script>
        const birthDateInput = document.getElementById('birthDate');
        const levelSelect = document.getElementById('levelSelect');
        const ageDisplay = document.getElementById('ageDisplay');
        const submitBtn = document.getElementById('submitBtn');

        birthDateInput.addEventListener('change', function() {
            const birthDate = new Date(this.value);
            const today = new Date();
            
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }

            if (age < 0) return;
            ageDisplay.innerText = `عمر المتسابق الآن: ${age} سنة`;

            // منطق تحديد المستوى بناءً على الحد الأقصى للسن
            if (age <= 10) {
                levelSelect.value = "المستوى الخامس";
            } else if (age <= 11) {
                levelSelect.value = "المستوى الرابع";
            } else if (age <= 13) {
                levelSelect.value = "المستوى الثالث";
            } else if (age <= 15) {
                levelSelect.value = "المستوى الثاني";
            } else if (age <= 20) {
                levelSelect.value = "المستوى الأول";
            } else {
                levelSelect.value = "";
                ageDisplay.innerText = `العمر ${age} سنة (تجاوز الحد الأقصى للمسابقة)`;
                alert("نعتذر، السن المسموح به للمسابقة حتى 20 عاماً فقط.");
            }
        });

        // كود الإرسال للجوجل شيت (نفس الكود السابق)
        const scriptURL = 'رابط_الويب_أب_الخاص_بك'; 
        const form = document.getElementById('registrationForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            document.getElementById('statusMsg').innerText = "جاري الحفظ...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('statusMsg').innerText = "تم التسجيل بنجاح!";
                // يمكنك إضافة تحويل للواتساب هنا كما فعلنا سابقاً
            })
            .catch(error => {
                submitBtn.disabled = false;
                document.getElementById('statusMsg').innerText = "خطأ في الاتصال!";
            });
        });
    </script>
</body>
</html>
