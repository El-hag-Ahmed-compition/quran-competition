<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج تسجيل المتسابق</title>
    <style>
        body { background: #06301d; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 1px solid #fdb931; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 15px #fdb931; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .btn-sub { background: #fdb931; color: #06301d; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fdb931">نموذج تسجيل المتسابق</h2>
        <form id="regForm">
            <input type="text" name="name" placeholder="الاسم رباعي" required>
            <input type="date" name="birthDate" required>
            <select name="level" required>
                <option value="المستوى الأول">المستوى الأول (قرآن كامل)</option>
                <option value="المستوى الثاني">المستوى الثاني (نصف القرآن)</option>
            </select>
            <input type="tel" name="phone" placeholder="رقم ولي الأمر (واتساب)" required>
            <button type="submit" class="btn-sub" id="subBtn">إرسال البيانات</button>
        </form>
        <div id="msg" style="margin-top:15px; font-weight:bold;"></div>
    </div>
    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbz8uxwflUhCnwHA29G3dDU0jq62aG0_xuyzaArf-WDjxEq0hFHnPUWtmOkBiYf958UG/exec"; // الرابط من جوجل سكريبت
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "جاري الحفظ...";
            fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    document.getElementById('msg').innerHTML = `تم التسجيل بنجاح!<br>كودك: <span style="color:#fdb931; font-size:1.5rem">${data.code}</span>`;
                    this.reset();
                }
            }).catch(() => { document.getElementById('msg').innerText = "حدث خطأ، تأكد من الرابط أو الإنترنت"; })
            .finally(() => { btn.disabled = false; btn.innerText = "إرسال البيانات"; });
        });
    </script>
</body>
</html>
