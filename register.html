<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل المتسابق</title>
    <style>
        body { background: #06301d; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn-send { background: #fdb931; color: #06301d; width: 100%; padding: 15px; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fdb931">تسجيل المتسابق</h2>
        <form id="regForm">
            <input type="text" name="name" placeholder="الاسم رباعي" required>
            <input type="date" name="birthDate" required>
            <select name="level" required>
                <option value="" disabled selected>اختر المستوى</option>
                <option value="المستوى الأول (قرآن كامل)">المستوى الأول (قرآن كامل)</option>
                <option value="المستوى الثاني (نصف القرآن)">المستوى الثاني (نصف القرآن)</option>
                <option value="المستوى الثالث (10 أجزاء)">المستوى الثالث (10 أجزاء)</option>
            </select>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required>
            <button type="submit" class="btn-send" id="subBtn">إرسال البيانات</button>
        </form>
        <div id="msg" style="margin-top:20px;"></div>
    </div>
    <script>
        const scriptURL = 'رابط_السكريبت_الخاص_بك';
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('subBtn').innerText = "جاري الحفظ...";
            fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(r => r.json()).then(res => {
                if(res.result === "success") {
                    document.getElementById('msg').innerHTML = `<p style="color:#fdb931">تم التسجيل! كودك: ${res.code}</p>`;
                    this.reset();
                }
            }).finally(() => document.getElementById('subBtn').innerText = "إرسال البيانات");
        };
    </script>
</body>
</html>
