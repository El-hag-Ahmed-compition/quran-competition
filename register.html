<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المتسابقين</title>
    <style>
        body {
            background-color: #0d3b26;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px;
            width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #fdb931;
        }
        label { display: block; margin-top: 10px; font-weight: bold; color: #ffd700; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 1rem; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #ffd700, #b8860b); color: #0d3b26; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { opacity: 0.9; }
        .msg { text-align: center; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>نموذج تسجيل المتسابق</h2>
    
    <div class="form-container">
        <label>اسم الطالب رباعي:</label>
        <input type="text" id="name" placeholder="ادخل الاسم كاملاً">

        <label>تاريخ الميلاد:</label>
        <input type="date" id="dob" onchange="calculateLevels()">

        <label>المستوى المتاح لك:</label>
        <select id="levelSelect">
            <option value="">ادخل تاريخ الميلاد أولاً</option>
        </select>

        <label>رقم ولي الأمر (واتساب):</label>
        <input type="tel" id="phone" placeholder="01xxxxxxxxx">

        <button onclick="submitData()">إرسال البيانات</button>
        <div id="responseMsg" class="msg"></div>
    </div>

    <script>
        function calculateLevels() {
            const dobValue = document.getElementById('dob').value;
            if (!dobValue) return;
            
            const dob = new Date(dobValue);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const levelSelect = document.getElementById('levelSelect');
            
            let options = '<option value="">اختر المستوى...</option>';
            if (age <= 10) options += '<option value="5">المستوى الخامس (5 أجزاء)</option>';
            if (age <= 11) options += '<option value="4">المستوى الرابع (ربع القرآن)</option>';
            if (age <= 13) options += '<option value="3">المستوى الثالث (ثلث القرآن)</option>';
            if (age <= 15) options += '<option value="2">المستوى الثاني (نصف القرآن)</option>';
            if (age <= 20) options += '<option value="1">المستوى الأول (قرآن كامل)</option>';

            levelSelect.innerHTML = (options === '<option value="">اختر المستوى...</option>') 
                ? '<option value="">عذراً، السن تجاوز الحد الأقصى</option>' 
                : options;
        }

        function submitData() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const level = document.getElementById('levelSelect').value;
            const phone = document.getElementById('phone').value;
            const msgDiv = document.getElementById('responseMsg');

            if(!name || !dob || !level || !phone) {
                alert("برجاء إكمال كافة البيانات");
                return;
            }

            msgDiv.style.color = "#ffd700";
            msgDiv.innerText = "جاري إرسال البيانات وتوليد الكود...";

            // ضع الرابط الجديد الخاص بك هنا (تأكد من عمل New Deployment في Apps Script)
            const url = "https://script.google.com/macros/s/AKfycbzTHBdub58gbHdaYeyCsQu5dD0Nq8LpTD-_3eSsN9k60X8RCnE7BDofJjASQqj4TsE/exec"; 

            fetch(url, {
                method: 'POST',
                body: JSON.stringify({name, dob, level, phone})
            })
            .then(res => res.json()) // التعديل هنا لقراءة الـ JSON
            .then(data => {
                if(data.status === "success") {
                    msgDiv.innerHTML = `
                        <div style="background: #fdb931; color: #0d3b26; padding: 15px; border-radius: 10px; border: 2px solid #fff;">
                            <p style="margin:0;">تم التسجيل بنجاح! كود الطالب هو:</p>
                            <h2 style="margin: 10px 0; font-size: 2.5rem; letter-spacing: 2px;">${data.code}</h2>
                            <p style="font-size: 0.8rem; margin:0;">صور الشاشة بهذا الكود</p>
                        </div>`;
                    document.getElementById('name').value = '';
                    document.getElementById('phone').value = '';
                } else {
                    msgDiv.innerText = "حدث خطأ في السكريبت: " + data.message;
                }
            })
            .catch(err => {
                msgDiv.style.color = "red";
                msgDiv.innerText = "حدث خطأ، تأكد من اتصال الإنترنت أو الرابط الجديد";
                console.error(err);
            });
        }
    </script>
</body>
</html>
