<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل المتسابقين | مسجد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body {
            background: #06301d; /* اللون الأخضر الغامق للمسجد */
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #fdb931; /* الإطار الذهبي */
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #fdb931;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.8rem;
            border-bottom: 1px solid rgba(253, 185, 49, 0.3);
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fdb931;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #fdb931;
            background: #fff;
            color: #333;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-submit {
            background: linear-gradient(135deg, #fdb931, #b8860b);
            color: #06301d;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        #msg {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #fdb931;
            line-height: 1.6;
        }

        .success-code {
            display: block;
            font-size: 2.2rem;
            margin-top: 10px;
            color: #fff;
            text-shadow: 0 0 10px #fdb931;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>تسجيل المتسابق</h2>
        
        <form id="registrationForm">
            <label>الاسم رباعي</label>
            <input type="text" name="name" placeholder="أدخل اسمك الكامل" required>
            
            <label>تاريخ الميلاد</label>
            <input type="date" name="birthDate" required>
            
            <label>المستوى</label>
            <select name="level" required>
                <option value="" disabled selected>اختر مستواك</option>
                <option value="المستوى الأول (حفظ القرآن الكريم كاملاً)">المستوى الأول (حفظ القرآن الكريم كاملاً)</option>
                <option value="المستوى الثاني (حفظ نصف القرآن الكريم)">المستوى الثاني (حفظ نصف القرآن الكريم)</option>
                <option value="المستوى الثالث (حفظ ثلث القرآن الكريم)">المستوى الثالث (حفظ ثلث القرآن الكريم)</option>
                <option value="المستوى الرابع (حفظ ربع القرآن الكريم)">المستوى الرابع (حفظ ربع القرآن الكريم)</option>
                <option value="المستوى الخامس (حفظ 5 أجزاء)">المستوى الخامس (حفظ 5 أجزاء)</option>
            </select>
            
            <label>رقم الهاتف</label>
            <input type="tel" name="phone" placeholder="01xxxxxxxxx" required>
            
            <button type="submit" class="btn-submit" id="submitBtn">إرسال البيانات</button>
        </form>

        <div id="msg"></div>
    </div>

    <script>
        // ضع رابط الـ Web App الخاص بك هنا بعد عمل Deploy للـ Apps Script
        const scriptURL = 'ضع_رابط_الويب_أب_هنا';

        document.getElementById('registrationForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgDiv = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";
            msgDiv.innerText = "";

            fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(response => response.json())
            .then(res => {
                if(res.result === "success") {
                    msgDiv.innerHTML = `تم التسجيل بنجاح!<br>احتفظ بكود الطالب الخاص بك:<br><span class="success-code">${res.code}</span>`;
                    this.reset();
                } else {
                    msgDiv.innerText = "حدث خطأ أثناء الحفظ: " + res.error;
                }
            })
            .catch(error => {
                msgDiv.innerText = "فشل الاتصال بالسيرفر، تأكد من الرابط";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "إرسال البيانات";
            });
        };
    </script>

</body>
</html>
