<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل المتسابقين</title>
    <style>
        body { background: #06301d; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 0 10px #fdb931; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        .btn { background: #fdb931; color: #06301d; padding: 15px; width: 95%; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fdb931">نموذج تسجيل المتسابق</h2>
        <form id="regForm">
            <input type="text" name="name" placeholder="الاسم رباعي" required>
            <input type="date" name="birthDate" required>
            <select name="level" required>
                <option value="المستوى الأول">المستوى الأول</option>
                <option value="المستوى الثاني">المستوى الثاني</option>
            </select>
            <input type="tel" name="phone" placeholder="رقم الهاتف (واتساب)" required>
            <button type="submit" class="btn" id="subBtn">إرسال البيانات</button>
        </form>
        <div id="msg" style="margin-top:15px; font-weight:bold;"></div>
    </div>
    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxtjn9dp7ZS_7DJxaWuDmBo2wQCu3ytxhs58qnXd_h-zGjxLG2O2nHN-xiqCabrrfUk/exec"; //
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "جاري الحفظ...";
            fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(res => res.json()).then(data => {
                if(data.result === "success") {
                    document.getElementById('msg').innerHTML = "تم التسجيل! كودك هو: " + data.code;
                    this.reset();
                }
            }).catch(() => alert("تأكد من الرابط أو الإنترنت"))
            .finally(() => { btn.disabled = false; btn.innerText = "إرسال البيانات"; });
        });
    </script>
</body>
</html>
