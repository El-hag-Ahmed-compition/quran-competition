<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المتسابقين</title>
    <style>
        body {
            background-color: #0d3b26;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .search-container {
            background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px;
            width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #fdb931; text-align: center;
        }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; font-size: 1.1rem; text-align: center; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
        .btn-info { background: linear-gradient(135deg, #fdb931, #b8860b); color: #0d3b26; }
        
        /* زرار النتيجة مخفي افتراضياً */
        #resultBtn { 
            background: linear-gradient(135deg, #28a745, #1e7e34); 
            color: #fff; 
            display: none; 
        }
        
        #displayArea { margin-top: 20px; }
        .card { background: rgba(255, 255, 255, 0.95); color: #0d3b26; padding: 20px; border-radius: 10px; text-align: right; }
        .status-badge { display: block; padding: 15px; border-radius: 8px; color: #fff; font-weight: bold; margin-top: 10px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h2>بوابة المتسابقين</h2>
    
    <div class="search-container">
        <p>أدخل كود الطالب الخاص بك:</p>
        <input type="text" id="studentCode" placeholder="M-xxxx">
        
        <button class="btn-info" onclick="fetchData('info')">معلومات الطالب</button>
        <button id="resultBtn" onclick="fetchData('result')">عرض النتيجة النهائية</button>
        
        <div id="displayArea"></div>
    </div>

    <script>
        function fetchData(type) {
            const code = document.getElementById('studentCode').value.trim();
            const displayArea = document.getElementById('displayArea');
            const resultBtn = document.getElementById('resultBtn');
            
            if(!code) {
                alert("برجاء إدخال الكود أولاً");
                return;
            }

            displayArea.innerHTML = "<p style='color:#fdb931'>جاري البحث...</p>";

            const url = "https://script.google.com/macros/s/AKfycbwL9jDUqpyv-YSH_V7lp8LTtgn7AH1L_Eg-LX6Oqkf9tQJDOEgvohlvCZgHhV26JW4n/exec"; 

            fetch(url + "?action=checkStatus&code=" + code)
            .then(res => res.json())
            .then(data => {
                if(data.status === "found") {
                    // إذا كانت الحالة غير "قيد المراجعة"، أظهر زرار النتيجة
                    if (data.studentStatus !== "قيد المراجعة") {
                        resultBtn.style.display = "block";
                    } else {
                        resultBtn.style.display = "none";
                    }

                    if(type === 'info') {
                        const dob = new Date(data.dob);
                        const age = new Date().getFullYear() - dob.getFullYear();
                        displayArea.innerHTML = `
                            <div class="card">
                                <h3 style="border-bottom:2px solid #fdb931; padding-bottom:5px">بيانات المتسابق</h3>
                                <p><b>الاسم:</b> ${data.name}</p>
                                <p><b>المستوى:</b> ${data.level}</p>
                                <p><b>السن:</b> ${age} سنة</p>
                                <p style="color: #888; font-size: 0.8rem;">* حالة النتيجة تظهر عند اعتمادها</p>
                            </div>`;
                    } else if (type === 'result') {
                        let color = "#28a745"; // أخضر للمؤهل
                        if(data.studentStatus === "غير مؤهل") color = "#dc3545"; // أحمر

                        displayArea.innerHTML = `
                            <div class="card" style="text-align:center">
                                <h3>النتيجة الرسمية</h3>
                                <p>المتسابق: <b>${data.name}</b></p>
                                <div class="status-badge" style="background:${color}">
                                    ${data.studentStatus}
                                </div>
                            </div>`;
                    }
                } else {
                    displayArea.innerHTML = "<p style='color:#ff4d4d'>الكود غير موجود</p>";
                    resultBtn.style.display = "none";
                }
            })
            .catch(err => {
                displayArea.innerHTML = "<p style='color:#ff4d4d'>خطأ في الاتصال</p>";
            });
        }
    </script>
</body>
</html>
