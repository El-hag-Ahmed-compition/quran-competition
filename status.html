<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معلومات الطالب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #06301d; color: #fff; font-family: 'Cairo', sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; }
        .res-card { display: none; background: #fff; color: #000; padding: 15px; border-radius: 10px; margin-top: 20px; }
        #finalCard { width: 450px; background: #fff; color: #000; border: 5px solid #06301d; position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fdb931">الاستعلام وتحميل الكارت</h2>
        <input type="text" id="userCode" placeholder="أدخل الكود M-xxxx" style="padding:10px; width:70%;">
        <button onclick="check()" style="padding:10px; background:#fdb931; border:none; cursor:pointer;">بحث</button>
        <div id="resArea" class="res-card">
            <h3 id="dn"></h3>
            <p id="db"></p>
            <button onclick="downloadCard()" style="width:100%; padding:10px; background:#06301d; color:#fdb931; border:none; cursor:pointer;">تحميل كارت المتسابق ⬇️</button>
        </div>
    </div>
    <div id="finalCard">
        <div style="background:#06301d; color:#fdb931; padding:15px; font-weight:bold;">بطاقة متسابق | مسجد الحاج أحمد الملهود</div>
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <div id="ci" style="text-align:right; font-size:1.1rem; line-height:1.8;"></div>
            <div id="cq"></div>
        </div>
        <div style="background:#fdb931; color:#06301d; padding:8px; font-weight:bold;">يرجى إبراز الكارت عند دخول المسجد</div>
    </div>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwrWJ4zG7yGh0cXQIaTfW_8cqnxTUKPEFQIyFTmc_M9TPfYHQIZ0gTuzSX04rfMA30s/exec';
        let s = {};
        function check() {
            const c = document.getElementById('userCode').value;
            fetch(`${scriptURL}?action=checkStatus&code=${c}`).then(r=>r.json()).then(d=>{
                if(d.status === "found") {
                    s = d; s.code = c;
                    document.getElementById('resArea').style.display = "block";
                    document.getElementById('dn').innerText = d.name;
                    document.getElementById('db').innerText = "تاريخ الميلاد: " + d.birthDate;
                } else { alert("الكود غير صحيح"); }
            });
        }
        function downloadCard() {
            document.getElementById('ci').innerHTML = `الاسم: ${s.name}<br>الميلاد: ${s.birthDate}<br>المستوى: ${s.level}<br>الكود: ${s.code}`;
            document.getElementById('cq').innerHTML = "";
            new QRCode(document.getElementById("cq"), { text: s.code, width: 100, height: 100 });
            setTimeout(() => {
                html2canvas(document.getElementById('finalCard')).then(canvas => {
                    let a = document.createElement('a'); a.download=`كارت-${s.name}.png`; a.href=canvas.toDataURL(); a.click();
                });
            }, 1000);
        }
    </script>
</body>
</html>
