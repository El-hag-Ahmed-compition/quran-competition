<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيانات المتسابق - مسجد الملهود</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { background-color: #06301d; color: #fff; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .main-container { background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 20px; border: 1px solid #fdb931; width: 100%; max-width: 500px; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; margin: 15px 0; text-align: center; font-size: 1.2rem; }
        .btn-gold { background: #fdb931; color: #06301d; padding: 15px; border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1rem; }
        
        #resultView { display: none; background: #fff; color: #06301d; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; }
        .res-box { background: #fdb931; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 5px; }

        /* الكارت المخفي للتحميل */
        #idCard { width: 450px; background: #fff; border: 8px solid #06301d; position: absolute; left: -9999px; color: #000; padding-bottom: 10px; }
        .card-header { background: #06301d; color: #fdb931; padding: 15px; font-weight: bold; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 id="pageTitle" style="color: #fdb931;">استعلام عن متسابق</h2>
        
        <div id="searchUI">
            <input type="text" id="studentCode" placeholder="أدخل كود الطالب M-xxxx">
            <button class="btn-gold" onclick="loadData()">عرض البيانات والنتيجة</button>
        </div>

        <div id="resultView">
            <h3 style="text-align: center; margin-top: 0;">تفاصيل المتسابق</h3>
            <div class="info-row"><span>الاسم:</span> <b id="outName"></b></div>
            <div class="info-row"><span>السن:</span> <b id="outAge"></b></div>
            <div class="info-row"><span>المستوى:</span> <b id="outLevel"></b></div>
            <div class="info-row"><span>رقم الهاتف:</span> <b id="outPhone"></b></div>
            
            <p style="margin-top: 15px; font-weight: bold;">نتيجة المرحلة الأولى:</p>
            <div id="outRes1" class="res-box"></div>

            <p style="margin-top: 10px; font-weight: bold;">نتيجة المرحلة الثانية:</p>
            <div id="outRes2" class="res-box"></div>

            <button class="btn-gold" style="background:#06301d; color:#fdb931; margin-top:20px;" onclick="downloadImage()">⬇️ تحميل بطاقة المتسابق</button>
        </div>
    </div>

    <div id="idCard">
        <div class="card-header">بطاقة متسابق | مسابقة مسجد الملهود</div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
            <div id="cardText" style="line-height: 2; font-weight: bold; text-align: right; font-size: 1.1rem;"></div>
            <div id="cardQR"></div>
        </div>
        <div style="background:#fdb931; color:#000; text-align:center; font-size:14px; padding:8px; font-weight:bold;">يرجى إبراز البطاقة عند الحضور للمسجد</div>
    </div>

    <script>
        const webAppUrl = "رابط_السكربت_الخاص_بك"; 
        let sData = {};

        function loadData() {
            const code = document.getElementById('studentCode').value.trim();
            if(!code) return alert("من فضلك أدخل الكود");

            fetch(`${webAppUrl}?action=checkStatus&code=${code}`)
            .then(r => r.json()).then(data => {
                if(data.status === "found") {
                    sData = data; sData.code = code;
                    document.getElementById('searchUI').style.display = "none";
                    document.getElementById('pageTitle').innerText = "بيانات الطالب";
                    document.getElementById('resultView').style.display = "block";
                    
                    document.getElementById('outName').innerText = data.name;
                    document.getElementById('outAge').innerText = data.age + " سنة";
                    document.getElementById('outLevel').innerText = data.level;
                    document.getElementById('outPhone').innerText = data.phone;
                    document.getElementById('outRes1').innerText = data.res1;
                    document.getElementById('outRes2').innerText = data.res2;
                } else { alert("الكود غير موجود"); }
            });
        }

        function downloadImage() {
            document.getElementById('cardText').innerHTML = `
                الاسم: ${sData.name}<br>
                السن: ${sData.age} سنة<br>
                المستوى: ${sData.level}<br>
                الكود: ${sData.code}
            `;
            document.getElementById('cardQR').innerHTML = "";
            new QRCode(document.getElementById("cardQR"), { text: sData.code, width: 110, height: 110 });
            
            setTimeout(() => {
                html2canvas(document.querySelector("#idCard"), {scale: 2}).then(canvas => {
                    let link = document.createElement('a');
                    link.download = `كارت-${sData.name}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }, 600);
        }
    </script>
</body>
</html>
