<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة النتائج</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #06301d; color: #fff; text-align: center; font-family: sans-serif; }
        .box { border: 1px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; }
        .res-box { display: none; background: #fff; color: #000; padding: 15px; margin-top: 15px; border-radius: 10px; }
        #hiddenCard { width: 400px; background: #fff; color: #000; border: 5px solid #06301d; position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>استعلام النتائج</h2>
        <input type="text" id="c" placeholder="أدخل كودك M-xxxx" style="padding:10px; width:80%;">
        <button onclick="check()" style="padding:10px; background:#fdb931; border:none; margin-top:10px; cursor:pointer;">استعلام</button>

        <div id="rb" class="res-box">
            <h3 id="rn"></h3>
            <p>السن: <b id="ra"></b></p>
            <p>النتيجة: <b id="rr"></b></p>
            <button onclick="saveCard()" style="padding:10px; background:#06301d; color:#fdb931; border:none; cursor:pointer;">تحميل الكارت</button>
        </div>
    </div>

    <div id="hiddenCard">
        <div style="background:#06301d; color:#fdb931; padding:10px; text-align:center;">بطاقة متسابق | مسجد الملهود</div>
        <div style="padding:15px; display:flex; justify-content:space-between;">
            <div id="ctext" style="text-align:right;"></div>
            <div id="cqr"></div>
        </div>
    </div>

    <script>
        const sURL = "https://script.google.com/macros/s/AKfycbz8uxwflUhCnwHA29G3dDU0jq62aG0_xuyzaArf-WDjxEq0hFHnPUWtmOkBiYf958UG/exec";
        let curData = {};

        function check() {
            const code = document.getElementById('c').value;
            fetch(`${sURL}?action=checkStatus&code=${code}`).then(r=>r.json()).then(d=>{
                if(d.status==="found") {
                    curData = d; curData.code = code;
                    document.getElementById('rb').style.display="block";
                    document.getElementById('rn').innerText = d.name;
                    document.getElementById('ra').innerText = d.age; // هيظهر صح
                    document.getElementById('rr').innerText = d.res1;
                } else { alert("الكود خطأ"); }
            });
        }

        function saveCard() {
            document.getElementById('ctext').innerHTML = `الاسم: ${curData.name}<br>السن: ${curData.age}<br>الكود: ${curData.code}`;
            document.getElementById('cqr').innerHTML = "";
            new QRCode(document.getElementById("cqr"), { text: curData.code, width: 80, height: 80 });
            
            // حل مشكلة الـ QR اللي مش بيظهر: استنى ثانية قبل التصوير
            setTimeout(() => {
                html2canvas(document.getElementById('hiddenCard')).then(cv => {
                    let a = document.createElement('a'); a.download=`كارت-${curData.name}.png`; a.href=cv.toDataURL(); a.click();
                });
            }, 1000);
        }
    </script>
</body>
</html>
