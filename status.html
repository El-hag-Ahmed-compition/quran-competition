<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النتائج والمرحلة الثانية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body {
            background-color: #06301d; background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }
        .search-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px;
            border: 1px solid #fdb931; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: none; font-size: 1.2rem; text-align: center; }
        .btn-check { background: linear-gradient(135deg, #ffd700, #b8860b); color: #06301d; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .result-card { background: #fff; color: #06301d; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; }
        .status-tag { display: block; padding: 10px; border-radius: 8px; color: #fff; text-align: center; font-weight: bold; margin-top: 10px; }
        .success { background: #28a745; }
        .fail { background: #dc3545; }
        .wait { background: #ffc107; color: #000; }
    </style>
</head>
<body>

    <div class="search-box">
        <h2 style="color: #fdb931;">استعلام النتائج</h2>
        <input type="text" id="studentCode" placeholder="أدخل الكود M-xxxx">
        <button class="btn-check" onclick="checkStatus()">استعلام الآن</button>
        <div id="displayArea"></div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbzUUCmD-prnXv2hGd1rUmzZe1I7TLZ-dovrZfwQXOftz9COPwByeB9rDcCAVnSfOEEW/exec";

        function checkStatus() {
            const code = document.getElementById('studentCode').value.trim();
            const area = document.getElementById('displayArea');
            if(!code) return alert("أدخل الكود");

            area.innerHTML = "<p>جاري جلب البيانات...</p>";

            fetch(`${scriptUrl}?action=checkStatus&code=${code}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "found") {
                    let html = `
                        <div class="result-card">
                            <h3>مرحباً: ${data.name}</h3>
                            <p><b>نتيجة المرحلة الأولى (التصفية):</b></p>
                            <span class="status-tag ${getStatusClass(data.res1)}">${data.res1}</span>
                    `;
                    
                    // إذا كان مؤهل للمرحلة الأولى، تظهر نتيجة المرحلة الثانية
                    if(data.res1 === "مؤهل") {
                        html += `
                            <hr>
                            <p><b>نتيجة المرحلة الثانية (النهائية):</b></p>
                            <span class="status-tag ${getStatusClass(data.res2)}">${data.res2}</span>
                        `;
                    }
                    
                    html += `</div>`;
                    area.innerHTML = html;
                } else {
                    area.innerHTML = "<p style='color:red'>الكود غير موجود</p>";
                }
            });
        }

        function getStatusClass(status) {
            if(status === "مؤهل" || status === "ناجح" || status.includes("الأول")) return "success";
            if(status === "غير مؤهل" || status === "لم يوفق") return "fail";
            return "wait";
        }
    </script>
</body>
</html>
