<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة معلومات الطالب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #06301d; color: #fff; text-align: center; font-family: sans-serif; }
        .box { border: 1px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; }
        .res-card { display: none; background: #fff; color: #000; padding: 20px; margin-top: 20px; border-radius: 10px; }
        #finalCard { width: 400px; background: #fff; color: #000; border: 4px solid #06301d; position: absolute; left: -9999px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fdb931">استعلام معلومات الطالب</h2>
        <input type="text" id="codeIn" placeholder="أدخل كودك M-xxxx" style="padding:10px; width:70%; border-radius:5px;">
        <button onclick="search()" style="padding:10px; background:#fdb931; border:none; cursor:pointer; font-weight:bold;">استعلام الآن</button>

        <div id="resultArea" class="res-card">
            <h3 id="displayName"></h3>
            <p>السن: <b id="displayAge"></b> سنة</p> <p>النتيجة: <b id="displayRes" style="background:#28a745; color:#fff; padding:5px 10px; border-radius:5px;"></b></p>
            <button onclick="downloadCard()" style="padding:10px; background:#06301d; color:#fdb931; border:none; cursor:pointer; width:100%;">تحميل كارت الطالب ⬇️</button>
        </div>
    </div>

    <div id="finalCard">
        <div style="background:#06301d; color:#fdb931; padding:10px; font-weight:bold;">بطاقة متسابق | مسجد الملهود</div>
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <div id="cardInfo" style="text-align:right; font-size:1.1rem;"></div>
            <div id="cardQR"></div>
        </div>
        <div style="background:#fdb931; color:#06301d; padding:5px; font-size:0.8rem;">يرجى إبراز الكارت عند دخول المسجد</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxtjn9dp7ZS_7DJxaWuDmBo2wQCu3ytxhs58qnXd_h-zGjxLG2O2nHN-xiqCabrrfUk/exec";
        let student = {};

        function search() {
            const code = document.getElementById('codeIn').value;
            fetch(`${scriptURL}?action=checkStatus&code=${code}`).then(r=>r.json()).then(d=>{
                if(d.status === "found") {
                    student = d; student.code = code;
                    document.getElementById('resultArea').style.display = "block";
                    document.getElementById('displayName').innerText = "مرحباً: " + d.name;
                    document.getElementById('displayAge').innerText = d.age;
                    document.getElementById('displayRes').innerText = d.res1;
                } else { alert("الكود غير صحيح أو لم يتم تسجيله بعد"); }
            });
        }

        function downloadCard() {
            document.getElementById('cardInfo').innerHTML = `الاسم: ${student.name}<br>السن: ${student.age}<br>الكود: ${student.code}`;
            document.getElementById('cardQR').innerHTML = "";
            new QRCode(document.getElementById("cardQR"), { text: student.code, width: 90, height: 90 });
            
            setTimeout(() => {
                html2canvas(document.getElementById('finalCard')).then(canvas => {
                    let a = document.createElement('a'); a.download=`كارت-${student.name}.png`; a.href=canvas.toDataURL(); a.click();
                });
            }, 1000); // انتظار لضمان رسم الـ QR
        }
    </script>
</body>
</html>
