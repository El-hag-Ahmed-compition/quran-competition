<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المتسابق | مسجد الملهود</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body {
            background-color: #06301d; background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px;
        }
        .main-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px;
            border: 1px solid #fdb931; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; border: none; font-size: 1.2rem; text-align: center; box-sizing: border-box; }
        .btn-gold { background: #fdb931; color: #06301d; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        /* واجهة النتيجة */
        #resultArea { display: none; background: #fff; color: #06301d; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: right; }
        .status-tag { display: block; padding: 10px; border-radius: 8px; color: #fff; text-align: center; font-weight: bold; margin: 10px 0; }
        .success { background: #28a745; } .fail { background: #dc3545; } .wait { background: #ffc107; color: #000; }
        .info-text { border-bottom: 1px solid #eee; padding: 5px 0; display: flex; justify-content: space-between; }

        /* الكارت المخفي للتصوير */
        #hiddenCard { width: 400px; background: #fff; border: 6px solid #06301d; position: absolute; left: -9999px; color: #000; }
        .card-header { background: #06301d; color: #fdb931; padding: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div class="main-box">
        <h2 id="titleText" style="color: #fdb931;">استعلام النتائج</h2>
        
        <div id="searchUI">
            <input type="text" id="studentCode" placeholder="أدخل الكود M-xxxx">
            <button class="btn-gold" onclick="processSearch()">استعلام الآن</button>
        </div>

        <div id="resultArea">
            <h3 id="displayName" style="text-align: center; margin-bottom: 15px;"></h3>
            <div class="info-text"><span>السن:</span> <b id="displayAge"></b></div>
            <div class="info-text"><span>المستوى:</span> <b id="displayLevel"></b></div>
            <div class="info-text"><span>الهاتف:</span> <b id="displayPhone"></b></div>
            <hr>
            <p><b>نتيجة المرحلة الأولى:</b></p>
            <div id="tag1" class="status-tag"></div>
            
            <div id="secondStageArea" style="display:none;">
                <p><b>نتيجة المرحلة الثانية:</b></p>
                <div id="tag2" class="status-tag"></div>
            </div>

            <button class="btn-gold" style="background:#06301d; color:#fdb931; margin-top:20px;" onclick="downloadStudentCard()">⬇️ تحميل كارت الطالب</button>
        </div>
    </div>

    <div id="idCard">
        <div class="card-header">بطاقة متسابق | مسجد الملهود</div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
            <div id="cardText" style="line-height: 1.8; font-weight: bold; text-align: right;"></div>
            <div id="cardQR"></div>
        </div>
        <div style="background:#fdb931; color:#000; text-align:center; font-size:12px; padding:5px; font-weight:bold;">يرجى إبراز الكارت عند دخول المسجد</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwgwCbTxK1UR5V9nBAF8U5M4Tq30zzmcKU8-uhe8zJYqOZ9S59qzbx6Lt4BRBoyGKB4/exec"; // تأكد من وضع رابط الـ Web App الجديد هنا
        let studentData = {};

        function processSearch() {
            const code = document.getElementById('studentCode').value.trim();
            if(!code) return alert("أدخل الكود أولاً");

            document.querySelector('.btn-gold').innerText = "جاري البحث...";

            fetch(`${scriptURL}?action=checkStatus&code=${code}`)
            .then(r => r.json()).then(data => {
                if(data.status === "found") {
                    studentData = data; studentData.code = code;
                    
                    document.getElementById('searchUI').style.display = "none";
                    document.getElementById('titleText').innerText = "معلومات المتسابق";
                    document.getElementById('resultArea').style.display = "block";
                    
                    document.getElementById('displayName').innerText = "مرحباً: " + data.name;
                    document.getElementById('displayAge').innerText = data.age + " سنة";
                    document.getElementById('displayLevel').innerText = data.level;
                    document.getElementById('displayPhone').innerText = data.phone;

                    // تعيين ألوان الحالة للمرحلة الأولى
                    const t1 = document.getElementById('tag1');
                    t1.innerText = data.res1;
                    t1.className = "status-tag " + getTagClass(data.res1);

                    // إظهار المرحلة الثانية لو مؤهل أو ناجح
                    if(data.res1 === "مؤهل" || data.res1 === "ناجح") {
                        document.getElementById('secondStageArea').style.display = "block";
                        const t2 = document.getElementById('tag2');
                        t2.innerText = data.res2;
                        t2.className = "status-tag " + getTagClass(data.res2);
                    }
                } else {
                    alert("الكود غير صحيح");
                    document.querySelector('.btn-gold').innerText = "استعلام الآن";
                }
            }).catch(() => {
                alert("حدث خطأ في الاتصال بالسيرفر");
                document.querySelector('.btn-gold').innerText = "استعلام الآن";
            });
        }

        function getTagClass(status) {
            if(status === "مؤهل" || status === "ناجح" || status.includes("الأول")) return "success";
            if(status === "غير مؤهل" || status === "لم يوفق") return "fail";
            return "wait";
        }

        function downloadStudentCard() {
            document.getElementById('cardText').innerHTML = `
                الاسم: ${studentData.name}<br>
                السن: ${studentData.age} سنة<br>
                المستوى: ${studentData.level}<br>
                الكود: ${studentData.code}
            `;
            document.getElementById('cardQR').innerHTML = "";
            new QRCode(document.getElementById("cardQR"), { text: studentData.code, width: 90, height: 90 });
            
            setTimeout(() => {
                html2canvas(document.querySelector("#idCard"), {scale: 2}).then(canvas => {
                    let a = document.createElement('a');
                    a.download = `كارت-${studentData.name}.png`;
                    a.href = canvas.toDataURL();
                    a.click();
                });
            }, 600);
        }
    </script>
</body>
</html>
