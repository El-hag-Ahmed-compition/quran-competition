<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap');

        body {
            background-color: #06301d; /* درجة الأخضر الغامق */
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* نقشة الأرابيسك */
            background-blend-mode: overlay;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header-logo {
            width: 150px;
            margin-bottom: 10px;
        }

        .title-top {
            color: #fdb931;
            font-weight: bold;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .bismillah {
            font-family: 'Amiri Quran', serif;
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .quran-verse {
            font-family: 'Amiri Quran', serif;
            font-size: 1.5rem;
            text-align: center;
            max-width: 350px;
            color: #fdb931;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: #06301d;
            border: none;
            padding: 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            flex: 1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-large {
            width: 80%;
            font-size: 1.5rem;
            padding: 20px;
            margin: 10px 0;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .footer-text {
            margin-top: auto;
            color: #fdb931;
            font-weight: bold;
            font-size: 1.2rem;
            padding-top: 30px;
        }

        .bottom-bar {
            width: 100%;
            height: 40px;
            background-color: #042416;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="title-top">مسابقة مسجد الحاج أحمد الملهود</div>
    
    <img src="https://i.ibb.co/3ykH79p/logo.png" alt="Logo" class="header-logo">

    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>

    <div class="quran-verse">
        قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ (58)
    </div>

    <div class="main-container">
        <div class="row">
            <a href="rules.html" class="btn">الشروط</a>
            <a href="levels.html" class="btn">المستويات</a>
        </div>

        <a href="register.html" class="btn btn-large">سجل الآن</a>

        <div class="row">
            <a href="status.html" class="btn">معلومات الطالب</a>
            <a href="schedule.html" class="btn">المواعيد</a>
        </div>
    </div>

    <div class="footer-text">نحو جيل متقن لكتاب الله</div>
    <div class="bottom-bar"></div>

</body>
</html>
