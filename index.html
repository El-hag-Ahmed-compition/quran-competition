<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        body {
            background-color: #0d3b26; /* الأخضر الغامق اللي في الصورة */
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fdb931; /* اللون الذهبي */
            font-family: 'Amiri', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-bottom: 50px;
        }
        .header { text-align: center; padding: 20px; }
        .header h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .bismillah { font-size: 2.5rem; margin: 15px 0; }
        .verse { color: #fff; font-size: 1.3rem; max-width: 90%; line-height: 1.8; margin: 10px auto; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 85%;
            max-width: 400px;
            margin-top: 30px;
        }
        .btn {
            background: linear-gradient(to bottom, #ffe259, #ffa751); /* تدرج ذهبي زي الصورة */
            color: #0d3b26;
            padding: 15px;
            border-radius: 25px;
            text-align: center;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-center { grid-column: span 2; margin: 0 auto; width: 60%; }
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background-color: #072a1b;
            border-top: 3px solid #14452f;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مسابقة مسجد الحاج أحمد الملهود</h1>
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="verse">"قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَٰلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِّمَّا يَجْمَعُونَ" (58)</div>
        <p style="color: #fff;">نحو جيل متقن لكتاب الله</p>
    </div>

    <div class="grid-container">
        <a href="levels.html" class="btn">المستويات</a>
        <a href="rules.html" class="btn">الشروط</a>
        <a href="register.html" class="btn btn-center">سجل الآن</a>
        <a href="status.html" class="btn">حالة الطالب</a>
        <a href="schedule.html" class="btn">المواعيد</a>
    </div>

    <div class="footer-bar"></div>

</body>
</html>
