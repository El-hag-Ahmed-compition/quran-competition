<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap');
        * { box-sizing: border-box; }
        body { background-color: #06301d; background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); background-blend-mode: overlay; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; text-align: center; }
        .top-title { color: #fdb931; font-weight: bold; font-size: 1.6rem; margin-top: 30px; margin-bottom: 20px; text-shadow: 1px 1px 2px #000; }
        .bismillah { font-family: 'Amiri Quran', serif; font-size: 2.8rem; margin: 20px 0; color: #fff; }
        .quran-verse { font-family: 'Amiri Quran', serif; font-size: 1.5rem; color: #fdb931; max-width: 400px; line-height: 1.8; margin: 20px auto 40px; }
        
        /* تصميم العداد التنازلي الجديد */
        .countdown-container {
            background: rgba(253, 185, 49, 0.1);
            border: 1px solid #fdb931;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 400px;
        }
        .timer-display { font-size: 1.6rem; font-weight: bold; color: #fff; display: flex; justify-content: center; gap: 15px; }
        .timer-unit { min-width: 60px; }
        .timer-label { color: #fdb931; font-size: 0.8rem; display: block; margin-top: 5px; }

        .buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 400px; }
        .btn { background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); color: #06301d; border: none; padding: 18px; border-radius: 25px; font-weight: bold; font-size: 1.1rem; text-decoration: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s; }
        .register-btn { grid-column: span 2; margin: 10px auto; width: 85%; padding: 22px; font-size: 1.8rem; border-radius: 40px; box-shadow: 0 0 25px rgba(253,185,49,0.4); }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .footer-note { margin-top: auto; color: #fdb931; font-weight: bold; font-size: 1.4rem; padding: 40px 0; }
        .bottom-line { width: 100%; height: 15px; background: #042416; border-top: 2px solid #b8860b; position: fixed; bottom: 0; }
    </style>
</head>
<body>
    <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="quran-verse">قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ (58)</div>

    <div id="counterArea" class="countdown-container">
        <div style="color: #fdb931; margin-bottom: 8px; font-weight: bold; font-size: 1.1rem;">متبقي على انطلاق المسابقة</div>
        <div class="timer-display">
            <div class="timer-unit"><span id="days">00</span><label class="timer-label">يوم</label></div>
            <div class="timer-unit"><span id="hours">00</span><label class="timer-label">ساعة</label></div>
            <div class="timer-unit"><span id="minutes">00</span><label class="timer-label">دقيقة</label></div>
            <div class="timer-unit"><span id="seconds">00</span><label class="timer-label">ثانية</label></div>
        </div>
    </div>

    <div class="buttons-grid">
        <a href="rules.html" class="btn">الشروط</a>
        <a href="levels.html" class="btn">المستويات</a>
        <a href="register.html" class="btn register-btn" id="regBtn">سجل الآن</a>
        <a href="status.html" class="btn">معلومات الطالب</a>
        <a href="schedule.html" class="btn">المواعيد</a>
    </div>

    <div class="footer-note">نحو جيل متقن لكتاب الله</div>
    <div class="bottom-line"></div>

    <script>
        // موعد انطلاق المسابقة: 1 يوليو 2026
        const targetDate = new Date("2026-07-01T00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;

            // إذا انتهى الوقت، يختفي العداد فقط ويبقى كل شيء كما هو
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("counterArea").style.display = "none";
            }
        }, 1000);
    </script>
</body>
</html>
