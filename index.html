<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        :root {
            --primary-green: #14452F;
            --accent-gold: linear-gradient(135deg, #FFD700, #FDB931);
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-green);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png'); /* زخرفة إسلامية خفيفة */
            color: var(--text-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        .header h1 { font-size: 1.8rem; color: #FDB931; margin-bottom: 10px; }
        .bismillah { font-size: 2.5rem; margin: 20px 0; font-family: 'Amiri', serif; }
        .verse { font-size: 1.2rem; color: #e0e0e0; max-width: 90%; margin: 0 auto; line-height: 1.6; }

        .buttons-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            background: var(--accent-gold);
            color: #14452F;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        .btn-full { grid-column: span 2; background: #fdb931; }

        /* رسالة التنبيه */
        #status-msg {
            margin-top: 15px;
            color: #ffca28;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مسابقة مسجد الحاج أحمد الملهود</h1>
        <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="verse">"قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَٰلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِّمَّا يَجْمَعُونَ"</div>
        <p>نحو جيل متقن لكتاب الله</p>
    </div>

    <div class="buttons-container">
        <a href="rules.html" class="btn">الشروط</a>
        <a href="levels.html" class="btn">المستويات</a>
        
        <button onclick="checkRegistration()" class="btn btn-full">سجل الآن</button>
        
        <a href="schedule.html" class="btn">المواعيد</a>
        <a href="status.html" class="btn">حالة الطالب</a>
    </div>

    <div id="status-msg"></div>

    <script>
        function checkRegistration() {
            // --- حدد المواعيد هنا (سنة، شهر (يبدأ من 0)، يوم) ---
            const startDate = new Date(2024, 4, 1);  // مثلاً 1 مايو 2024
            const endDate = new Date(2024, 4, 15);  // مثلاً 15 مايو 2024
            const today = new Date();

            const msgElement = document.getElementById('status-msg');

            if (today < startDate) {
                msgElement.innerText = "التسجيل لم يبدأ بعد، يفتح في " + startDate.toLocaleDateString('ar-EG');
                msgElement.style.display = "block";
            } 
            else if (today > endDate) {
                msgElement.innerText = "عفواً، تم الانتهاء من فترة التسجيل";
                msgElement.style.display = "block";
            } 
            else {
                // لو الميعاد مظبوط يحوله لصفحة التسجيل
                window.location.href = "register.html";
            }
        }
    </script>

</body>
</html>
