<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل المتسابقين</title>
    <style>
        body { background: #06301d; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 1px solid #fdb931; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .btn { background: #fdb931; color: #06301d; padding: 12px; width: 95%; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تسجيل المتسابق</h2>
        <form id="regForm">
            <input type="text" name="name" placeholder="الاسم رباعي" required>
            <input type="date" name="birthDate" required>
            <select name="level" required>
                <option value="المستوى الأول">المستوى الأول</option>
                <option value="المستوى الثاني">المستوى الثاني</option>
            </select>
            <input type="tel" name="phone" placeholder="رقم الهاتف" required>
            <button type="submit" class="btn" id="subBtn">إرسال البيانات</button>
        </form>
        <div id="msg" style="margin-top:10px;"></div>
    </div>

    <script>
        // حط الرابط اللي نسخته من جوجل هنا
        const scriptURL = "https://script.google.com/macros/s/AKfycbzTHBdub58gbHdaYeyCsQu5dD0Nq8LpTD-_3eSsN9k60X8RCnE7BDofJjASQqj4TsE/exec";

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            btn.disabled = true; btn.innerText = "جاري الحفظ...";
            fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(res => res.json())
            .then(data => {
                if(data.result === "success") {
                    document.getElementById('msg').innerHTML = "تم التسجيل! كودك: " + data.code;
                    this.reset();
                }
            })
            .catch(() => alert("خطأ في الرابط أو الإنترنت"))
            .finally(() => { btn.disabled = false; btn.innerText = "إرسال البيانات"; });
        });
    </script>
</body>
</html>
