<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        body {
            background-color: #06301d;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .header { margin-top: 20px; }
        .header h1 { color: #fdb931; font-size: 1.8rem; margin: 5px 0; }
        .bismillah { font-size: 2rem; margin: 20px 0; }
        .quran-verse { font-size: 1.2rem; color: #fdb931; max-width: 90%; margin-bottom: 30px; line-height: 1.8; }
        
        .menu-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 90%;
            max-width: 400px;
        }
        .btn {
            background: linear-gradient(to bottom, #ffe28a, #fdb931);
            color: #06301d;
            padding: 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-large {
            grid-column: span 2;
            padding: 20px;
            font-size: 1.5rem;
        }
        .footer { margin-top: 40px; color: #fdb931; font-style: italic; }
    </style>
</head>
<body>
    <div class="header">
        <h1>مسابقة مسجد الحاج أحمد الملهود</h1>
    </div>

    <div class="bismillah">بسم الله الرحمن الرحيم</div>

    <div class="quran-verse">
        "قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَٰلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِّمَّا يَجْمَعُونَ" (58)
    </div>

    <div class="menu-container">
        <a href="#" class="btn">المستويات</a>
        <a href="#" class="btn">الشروط</a>
        <a href="register.html" class="btn btn-large">سجل الآن</a>
        <a href="#" class="btn">المواعيد</a>
        <a href="status.html" class="btn">معلومات الطالب</a>
    </div>

    <div class="footer">نحو جيل متقن لكتاب الله</div>
</body>
</html>
