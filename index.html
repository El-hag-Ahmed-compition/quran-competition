<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap');

        * { box-sizing: border-box; }
        body {
            background-color: #06301d;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            color: #fff; font-family: 'Cairo', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 15px; text-align: center;
        }

        .top-title { color: #fdb931; font-weight: bold; font-size: 1.2rem; margin-top: 10px; }
        
        .logo { width: 140px; margin: 15px 0; filter: drop-shadow(0 0 10px rgba(253,185,49,0.3)); }

        .bismillah { font-family: 'Amiri Quran', serif; font-size: 2.2rem; margin-bottom: 10px; }

        .quran-verse {
            font-family: 'Amiri Quran', serif; font-size: 1.3rem; color: #fdb931;
            max-width: 320px; line-height: 1.6; margin-bottom: 25px;
        }

        .buttons-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 350px; margin-top: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #06301d; border: none; padding: 12px; border-radius: 20px;
            font-weight: bold; font-size: 1rem; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s;
        }

        /* زر سجل الآن في المنتصف */
        .register-btn {
            grid-column: span 2; margin: 10px auto; width: 60%;
            padding: 18px; font-size: 1.4rem; border-radius: 30px;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(253,185,49,0.4); }

        .footer-note { margin-top: auto; color: #fdb931; font-weight: bold; font-size: 1.1rem; padding: 20px 0; }
        
        .bottom-line { width: 100%; height: 25px; background: #042416; position: fixed; bottom: 0; }
    </style>
</head>
<body>

    <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
    
    <img src="https://i.ibb.co/3ykH79p/logo.png" class="logo" alt="لوجو المسابقة">

    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>

    <div class="quran-verse">
        قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ (58)
    </div>

    <div class="buttons-grid">
        <a href="rules.html" class="btn">الشروط</a>
        <a href="levels.html" class="btn">المستويات</a>
        
        <a href="register.html" class="btn register-btn" id="regBtn">سجل الآن</a>

        <a href="status.html" class="btn">معلومات الطالب</a>
        <a href="schedule.html" class="btn">المواعيد</a>
    </div>

    <div class="footer-note">نحو جيل متقن لكتاب الله</div>
    <div class="bottom-line"></div>

    <script>
        // تحديد تاريخ نهاية التسجيل (سنة، شهر-1، يوم)
        // مثال: نهاية التسجيل يوم 15 مايو 2026
        const deadline = new Date(2026, 4, 15); 
        const today = new Date();

        if (today > deadline) {
            const btn = document.getElementById('regBtn');
            btn.innerText = "انتهى موعد التسجيل";
            btn.style.background = "gray";
            btn.style.pointerEvents = "none";
            btn.href = "#";
        }
    </script>
</body>
</html>
