<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة مسجد الحاج أحمد الملهود</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;700&display=swap');

        * { box-sizing: border-box; }
        body {
            background-color: #06301d;
            /* النقشة الأرابيسك الذهبي الخفيفة */
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            background-blend-mode: overlay;
            color: #fff; font-family: 'Cairo', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 15px; text-align: center;
        }

        .top-title { color: #fdb931; font-weight: bold; font-size: 1.4rem; margin-top: 10px; text-shadow: 1px 1px 2px #000; }
        
        /* ضبط اللوجو ليكون في النص */
        .logo-container { width: 180px; height: 180px; margin: 10px 0; }
        .logo { width: 100%; height: auto; filter: drop-shadow(0 0 8px rgba(253,185,49,0.5)); }

        .bismillah { font-family: 'Amiri Quran', serif; font-size: 2.5rem; margin: 5px 0; color: #fff; }

        .quran-verse {
            font-family: 'Amiri Quran', serif; font-size: 1.4rem; color: #fdb931;
            max-width: 350px; line-height: 1.8; margin-bottom: 20px;
        }

        .buttons-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 380px; margin-top: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
            color: #06301d; border: none; padding: 15px; border-radius: 25px;
            font-weight: bold; font-size: 1.1rem; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: 0.3s;
        }

        .register-btn {
            grid-column: span 2; margin: 10px auto; width: 70%;
            padding: 20px; font-size: 1.6rem; border-radius: 35px;
            box-shadow: 0 0 20px rgba(253,185,49,0.4);
        }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .footer-note { margin-top: auto; color: #fdb931; font-weight: bold; font-size: 1.3rem; padding: 25px 0; }
        
        .bottom-line { width: 100%; height: 30px; background: #042416; border-top: 2px solid #b8860b; position: fixed; bottom: 0; }
    </style>
</head>
<body>

    <div class="top-title">مسابقة مسجد الحاج أحمد الملهود</div>
    
    <div class="logo-container">
        <img src="https://i.ibb.co/6YmH9m0/1000094765.png" class="logo" alt="لوجو المسابقة">
    </div>

    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>

    <div class="quran-verse">
        قُلْ بِفَضْلِ اللَّهِ وَبِرَحْمَتِهِ فَبِذَلِكَ فَلْيَفْرَحُوا هُوَ خَيْرٌ مِمَّا يَجْمَعُونَ (58)
    </div>

    <div class="buttons-grid">
        <a href="rules.html" class="btn">الشروط</a>
        <a href="levels.html" class="btn">المستويات</a>
        
        <a href="register.html" class="btn register-btn" id="regBtn">سجل الآن</a>

        <a href="status.html" class="btn">معلومات الطالب</a>
        <a href="schedule.html" class="btn">المواعيد</a>
    </div>

    <div class="footer-note">نحو جيل متقن لكتاب الله</div>
    <div class="bottom-line"></div>

    <script>
        // لو حابب تقفل التسجيل في تاريخ معين أوتوماتيك
        const deadline = new Date("2026-05-15T23:59:59"); 
        if (new Date() > deadline) {
            const btn = document.getElementById('regBtn');
            btn.innerText = "انتهى موعد التسجيل";
            btn.style.background = "#555";
            btn.style.color = "#ccc";
            btn.style.pointerEvents = "none";
        }
    </script>
</body>
</html>
